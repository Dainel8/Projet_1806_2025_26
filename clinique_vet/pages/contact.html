<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="icon" type="image/png" href="../../images/logo_vet.svg" />
  </head>
  <body>
    <header>
      <img src="../../images/logo_vet.svg" alt="logo" />
      <h1>Clinique veterinaire de Molse</h1>
      <h2 aria-label="slogan">Par ce que leur santé, c'est votre bonheur</h2>
    </header>
    <nav aria-label="liste de navigation">
      <ul>
        <li>
          <a href="../index.html">Acceuil</a>
        </li>
        <li>
          <a href="contact.html">Contact</a>
        </li>
      </ul>
    </nav>
    <main>
      <h2>Contactez-nous :</h2>
      <form aria-label="formulaire de contact">
        <label>Nom :</label>
        <input type="text" name="nom" />
        <br /><br />
        <label>Adresse e-mail :</label>
        <input type="email" name="email" />
        <br /><br />
        <label>Sujet :</label>
        <input type="text" name="sujet" />
        <br /><br />
        <label>Message :</label>
        <input type="text" name="message" />
        <br /><br />
        <input type="submit" />
      </form>
    </main>
    <footer>
      <p>&copy; 2025 Clinique Vétérinaire de Molsheim — Tous droits réservés</p>
      <p>Contact : contact@clinique-molsheim.fr</p>
    </footer>
  </body>
</html>
